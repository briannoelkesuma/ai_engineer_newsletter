name: Process YouTube Videos

on:
  repository_dispatch:
    types: [new_video_uploaded]
  schedule:
    - cron: '0 1 * * *' # Backup daily run at 01:00 UTC to catch any missed videos
  workflow_dispatch: # Allows manual runs from the GitHub actions UI

permissions:
  contents: write # Grants permission to commit and push changes back to the repository

jobs:
  process-videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_PROXY: ${{ secrets.YOUTUBE_PROXY }}
        run: python main.py ${{ github.event.client_payload.video_id }}

      - name: Commit and push updated site
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update newsletter static site [skip ci]" && git push)
